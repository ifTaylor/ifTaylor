<div>
    <section class="relative overflow-hidden">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(249,115,22,0.45),transparent_80%),radial-gradient(circle_at_right,rgba(251,146,60,0.35),transparent_35%),linear-gradient(180deg,#fb923c_0%,#f97316_20%,#ea580c_100%)]"></div>
        <div class="absolute inset-0 opacity-[0.06] [background-image:linear-gradient(rgba(255,255,255,0.08)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.08)_1px,transparent_1px)] [background-size:32px_32px]"></div>

        <div class="relative mx-auto max-w-7xl px-6 py-10">
            <div class="pb-4 text-sm uppercase tracking-[0.32em] text-slate-950">
                Net Control
            </div>
            <div class="mb-6 rounded-2xl border border-slate-700 bg-slate-900/90 p-4 shadow">
                <div class="flex flex-wrap items-center gap-3">
                    <button
                            type="button"
                            class="rounded-lg bg-orange-500 px-4 py-2 text-sm font-semibold text-white hover:bg-orange-400"
                            (click)="saveCurrentSession()"
                    >
                        Save net
                    </button>

                    <button
                            type="button"
                            class="rounded-lg bg-slate-700 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-600"
                            (click)="exportCurrentSession()"
                    >
                        Export JSON
                    </button>

                    <label
                            class="cursor-pointer rounded-lg bg-slate-700 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-600"
                    >
                        Import JSON
                        <input
                                type="file"
                                accept="application/json,.json"
                                class="hidden"
                                (change)="importSession($event)"
                        />
                    </label>

                    <button
                            type="button"
                            class="rounded-lg bg-rose-700 px-4 py-2 text-sm font-semibold text-white hover:bg-rose-600"
                            (click)="clearCurrentSession()"
                    >
                        Clear current
                    </button>
                </div>

                <div class="mt-4 flex flex-wrap items-center gap-3">
                    <select
                            class="min-w-[240px] rounded-lg border border-slate-600 bg-slate-800 px-3 py-2 text-sm text-white"
                            [(ngModel)]="selectedSavedSessionId"
                    >
                        <option value="">Select saved net</option>
                        <option
                                *ngFor="let session of savedSessions"
                                [value]="session.id"
                        >
                            {{ session.name }} · {{ session.savedAt | date:'short' }}
                        </option>
                    </select>

                    <button
                            type="button"
                            class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-500"
                            (click)="loadSelectedSession()"
                            [disabled]="!selectedSavedSessionId"
                    >
                        Load saved
                    </button>

                    <button
                            type="button"
                            class="rounded-lg bg-rose-600 px-4 py-2 text-sm font-semibold text-white hover:bg-rose-500"
                            (click)="deleteSelectedSession()"
                            [disabled]="!selectedSavedSessionId"
                    >
                        Delete saved
                    </button>
                </div>
            </div>

            <div class="grid gap-6 xl:grid-cols-[1fr_1fr_1fr]">
                <script-panel
                        [openingScript]="openingScript"
                        [trafficPrompt]="trafficPrompt"
                        [lateCheckinPrompt]="lateCheckinPrompt"
                        [closingScript]="closingScript"
                />

                <checkin-form (stationAdded)="onStationAdded($event)" />

                <queue-panel
                        [queue]="queue"
                        (moveUp)="moveQueueUp($event)"
                        (moveDown)="moveQueueDown($event)"
                        (activate)="setActiveStation($event)"
                />
            </div>

            <div class="mt-6 grid gap-6 xl:grid-cols-[1.4fr_1fr]">
                <station-list
                        [stations]="stations"
                        (setActive)="setActiveStation($event)"
                        (markComplete)="markStationComplete($event)"
                        (removeStation)="removeStation($event)"
                />

                <session-log [entries]="logEntries" />
            </div>
        </div>
    </section>
</div>
